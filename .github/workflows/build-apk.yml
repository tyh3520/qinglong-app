name: build-apk

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          # project uses gradle 6.7 + agp 4.1; needs java 11 (not 17+)
          distribution: temurin
          java-version: "11"

      - name: setup flutter
        uses: subosito/flutter-action@v2
        with:
          # this app targets dart 2.x (sdk: ">=2.18.0 <3.0.0")
          # flutter 3.7.x is the last line that still ships dart 2.19
          flutter-version: "3.7.12"
          channel: stable
          cache: true

      - name: flutter doctor
        run: flutter doctor -v

      - name: pub get
        run: flutter pub get

      - name: restore keystore if provided
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/qinglong.keystore
            echo "keystore restored"
          else
            echo "no ANDROID_KEYSTORE_BASE64 secret; will build unsigned/debug-friendly if signing fails"
          fi

      - name: patch signing for ci when no keystore
        run: |
          set -e
          if [ ! -f android/app/qinglong.keystore ]; then
            python3 - <<'PY'
          from pathlib import Path
          p = Path("android/app/build.gradle")
          text = p.read_text()
          # fall back to debug signing when release keystore missing
          text = text.replace(
              "signingConfig signingConfigs.release",
              "signingConfig signingConfigs.debug",
          )
          p.write_text(text)
          print("patched build.gradle to use debug signing")
          PY
          fi

      - name: build apk
        run: flutter build apk --release

      - name: upload apk
        uses: actions/upload-artifact@v4
        with:
          name: qinglong-app-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
